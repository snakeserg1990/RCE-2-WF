esphome:
  name: ekf-rce-2-wf
  friendly_name: EKF RCE-2-WF
  on_boot:
    then:
      - switch.turn_off: relay_4

esp8266:
  board: esp01_1m

# Важно: отключаем логгирование на TX, чтобы не мешать светодиоду
logger:
  baud_rate: 0

# Enable Home Assistant API
api:
  encryption:
    key: "i17MPaLSx/ARjuApD1glgMJq/WwbY36+2s3wkcel03w="

ota:
  - platform: esphome
    password: "975d39fba7c9a5653d6b2da99f195f8a"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Ekf-Rce-2-Wf Fallback Hotspot"
    password: "B1RhUxQDaSg5"

captive_portal:

# Светодиод на GPIO1 (TX)
output:
  - platform: gpio
    pin: GPIO1
    id: led_output
    inverted: false  # ПОМЕНЯЙТЕ на true, если не заработает

light:
  - platform: binary
    name: "EKF Status LED"
    output: led_output
    id: status_led

interval:
  - interval: 1s
    then:
      - light.turn_on: status_led
      - delay: 100ms
      - light.turn_off: status_led

# Датчики BL0937
sensor:
  - platform: hlw8012
    model: BL0937
    sel_pin:
      number: GPIO12
      inverted: true
    cf_pin: GPIO4
    cf1_pin: GPIO5
    current:
      name: "EKF Current"
    voltage:
      name: "EKF Voltage"
    power:
      name: "EKF Power"
    energy:
      name: "EKF Energy"
    update_interval: 10s
    current_resistor: 0.001
    voltage_divider: 2351
    change_mode_every: 4
    initial_mode: CURRENT

# ИСПРАВЛЕНО: Все switch в одной секции
switch:
  # Реле розеток
  - platform: gpio
    name: "EKF Socket 1"
    pin: GPIO15
    id: relay_1
    restore_mode: RESTORE_DEFAULT_OFF
    
  - platform: gpio
    name: "EKF Socket 2"
    pin: GPIO13
    id: relay_2
    restore_mode: RESTORE_DEFAULT_OFF
    
  - platform: gpio
    name: "EKF Socket 3"
    pin: GPIO14
    id: relay_3
    restore_mode: RESTORE_DEFAULT_OFF
    
  - platform: gpio
    name: "EKF Socket 4"
    pin: GPIO3
    id: relay_4
    restore_mode: RESTORE_DEFAULT_OFF

  # ИСПРАВЛЕНО: Template switch теперь в секции switch, а не в binary_sensor
  - platform: template
    name: "EKF All Sockets"
    lambda: |-
      if (id(relay_1).state && id(relay_2).state && id(relay_3).state && id(relay_4).state) {
        return true;
      } else {
        return false;
      }
    turn_on_action:
      - switch.turn_on: relay_1
      - switch.turn_on: relay_2
      - switch.turn_on: relay_3
      - switch.turn_on: relay_4
    turn_off_action:
      - switch.turn_off: relay_1
      - switch.turn_off: relay_2
      - switch.turn_off: relay_3
      - switch.turn_off: relay_4

# Кнопка
binary_sensor:
  - platform: gpio
    name: "EKF Button"
    pin:
      number: GPIO16
      inverted: true
    filters:
      - delayed_on_off: 50ms
    on_press:
      then:
        - light.turn_on: status_led
        - delay: 500ms
        - light.turn_off: status_led
        - switch.toggle: relay_1
        - switch.toggle: relay_2
        - switch.toggle: relay_3
        - switch.toggle: relay_4
esphome:
  name: ekf-rce-2-wf
  friendly_name: Умная розетка
  on_boot:
    then:
      - switch.turn_off: relay_4
      - light.turn_off: led

esp8266:
  board: esp01_1m

logger:
  baud_rate: 0

api:
  encryption:
    key: "i17MPaLSx/ARjuApD1glgMJq/WwbY36+2s3wkcel03w=" #Заменить на ваш 

ota:
  - platform: esphome
    password: "975d39fba7c9a5653d6b2da99f195f8a" #Заменить на ваш 

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "Ekf-Rce-2-Wf Fallback Hotspot"
    password: "B1RhUxQDaSg5" #Заменить на ваш

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time
    
binary_sensor:
  - platform: status
    name: "WiFi Status"
    id: wifi_status
    internal: true
    
  - platform: gpio
    pin:
      number: GPIO16
      inverted: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms    
    name: "Кнопка"
    on_press:
      then:
        - lambda: |-
            if (id(relay_1).state || id(relay_2).state || id(relay_3).state || id(relay_4).state) {
              id(relay_1).turn_off();
              id(relay_2).turn_off();
              id(relay_3).turn_off();
              id(relay_4).turn_off();
            } else {
              // Последовательное включение всех розеток при нажатии кнопки
              id(sequential_start).execute();
            }

switch:
  - platform: gpio
    name: "Розетка 1"
    pin: GPIO15
    id: relay_1
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'id(update_led)();'
    on_turn_off:
      then:
        - lambda: 'id(update_led)();'
        
  - platform: gpio
    name: "Розетка 2"
    pin: GPIO13
    id: relay_2
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'id(update_led)();'
    on_turn_off:
      then:
        - lambda: 'id(update_led)();'
        
  - platform: gpio
    name: "Розетка 3"
    pin: GPIO14
    id: relay_3
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'id(update_led)();'
    on_turn_off:
      then:
        - lambda: 'id(update_led)();'
        
  - platform: gpio
    name: "Розетка 4"
    pin: GPIO3
    id: relay_4
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - lambda: 'id(update_led)();'
    on_turn_off:
      then:
        - lambda: 'id(update_led)();'

  - platform: template
    name: "Все розетки"
    id: all_sockets
    lambda: |-
      return id(relay_1).state && id(relay_2).state && id(relay_3).state && id(relay_4).state;
    turn_on_action:
      # Последовательное включение с задержкой
      - script.execute: sequential_start
    turn_off_action:
      # Одновременное выключение (это безопасно)
      - switch.turn_off: relay_1
      - switch.turn_off: relay_2
      - switch.turn_off: relay_3
      - switch.turn_off: relay_4

  - platform: template
    name: "Индикация"
    id: indicator_mode
    icon: "mdi:led-on"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          id(led_mode) = true;
          id(update_led)();
    turn_off_action:
      - lambda: |-
          id(led_mode) = false;
          id(update_led)();

output:
  - platform: gpio
    pin: GPIO1
    id: led_output
    inverted: false

light:
  - platform: binary
    name: "Режим светодиода"
    id: led
    output: led_output
    internal: true
    restore_mode: ALWAYS_OFF

globals:
  - id: led_mode
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: any_socket_on
    type: bool
    initial_value: 'false'
    restore_value: no
  - id: sequential_running
    type: bool
    initial_value: 'false'
    restore_value: no

script:
  - id: update_led
    then:
      - lambda: |-
          id(any_socket_on) = id(relay_1).state || id(relay_2).state || id(relay_3).state || id(relay_4).state;
          
          if (!id(led_mode)) {
            id(led).turn_off();
          } else {
            if (!id(wifi_status).state) {
              // Мигание при отсутствии WiFi
              if (millis() % 1000 < 500) {
                id(led).turn_on();
              } else {
                id(led).turn_off();
              }
            } else {
              // WiFi есть - обычный режим
              if (id(any_socket_on)) {
                id(led).turn_on();
              } else {
                id(led).turn_off();
              }
            }
          }

  - id: sequential_start
    then:
      - lambda: |-
          if (id(sequential_running)) return;
          id(sequential_running) = true;
      # Включаем розетки последовательно с задержкой 200ms
      - switch.turn_on: relay_1
      - delay: 200ms
      - switch.turn_on: relay_2
      - delay: 200ms
      - switch.turn_on: relay_3
      - delay: 200ms
      - switch.turn_on: relay_4
      - lambda: |-
          id(sequential_running) = false;

interval:
  - interval: 500ms
    then:
      - lambda: |-
          id(update_led)();

sensor:
  - platform: hlw8012
    model: BL0937
    sel_pin:
      number: GPIO12
      inverted: true
    cf_pin: GPIO4
    cf1_pin: GPIO5
    
    voltage:
      name: "Напряжение"
      id: voltage
      unit_of_measurement: V
      accuracy_decimals: 1
      
    current:
      name: "Ток"
      id: current
      unit_of_measurement: A
      accuracy_decimals: 2
      
    power:
      name: "Мощность"
      id: power
      unit_of_measurement: W
      accuracy_decimals: 1
      
    energy:
      name: "Энергия"
      id: energy
      unit_of_measurement: kWh
      accuracy_decimals: 3
      
    update_interval: 10s
    voltage_divider: 2350 #Откалибровать 
    current_resistor: 0.001 #Откалибровать 

  - platform: total_daily_energy
    name: "Потребление за день"
    power_id: power
    unit_of_measurement: kWh
    accuracy_decimals: 3